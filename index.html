<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת הגרלת התרי"ג - ישיבת שערי דעת</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300;500;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

        /* === צבעי רולקס הרשמיים === */
        :root {
            --bg-deep: #001a0f; 
            --panel-bg: rgba(0, 35, 18, 0.6); 
            --gold-matte: #d4af37; 
            --gold-bright: #f1c40f;
            --text-soft: #e0e6ed;
            --text-dim: #8fa898; 
            --ticket-free: #6e9380; 
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-soft);
            font-family: 'Rubik', sans-serif;
            margin: 0;
            overflow-x: hidden; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #00361d 0%, #000c06 100%);
            z-index: -1;
        }

        /* === פריסה בסיסית (מחשב) === */
        .main-stage {
            height: 67vh;
            display: flex;
            padding: 3vh;
            gap: 3vh;
            align-items: stretch;
        }

        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 0 0 20px rgba(0, 255, 100, 0.02);
            display: flex;
            flex-direction: column;
            padding: 2vh 2.5vh;
            flex: 1;
            box-sizing: border-box;
            height: 100%;
        }

        .center-col {
            flex: 1.3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* === אלמנטים מרכזיים === */
        .main-title { font-size: 5.5vh; font-weight: 900; letter-spacing: 2px; text-align: center; text-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .sub-title { font-size: 2.2vh; color: var(--gold-matte); letter-spacing: 4px; font-weight: 700; text-align: center; margin-bottom: 2vh; }

        /* === כפתור תרומה === */
        .donate-btn {
            margin-top: 3vh;
            background: linear-gradient(135deg, #FFD700 0%, #d4af37 100%);
            color: #000;
            font-size: 2.5vh;
            font-weight: 900;
            padding: 1.5vh 4vh;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
            border: 2px solid #fff;
            transition: all 0.3s ease;
            text-align: center;
            display: inline-block;
        }
        
        .donate-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.6);
            background: linear-gradient(135deg, #f1c40f 0%, #e6b800 100%);
        }

        /* === עיצוב השעון === */
        .rolex-container {
            position: relative;
            width: 33vh; height: 33vh; 
            background: #000;
            border-radius: 50%;
            border: 5px dashed var(--gold-matte); 
            box-shadow: 0 0 0 5px #4a3b1a, inset 0 0 40px #000, 0 10px 40px rgba(0, 0, 0, 0.8);
            display: flex; justify-content: center; align-items: center;
        }

        .rolex-face {
            position: absolute; width: 92%; height: 92%;
            background: radial-gradient(circle, #002211 0%, #000000 100%); 
            border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .rolex-face::before {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 95%; height: 95%; 
            border-radius: 50%;
            border: 2px solid rgba(212, 175, 55, 0.35); 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
            z-index: 0;
            pointer-events: none;
        }
        
        .timer-digital {
            font-family: 'Orbitron', sans-serif;
            color: #fff; 
            font-size: 4vh; 
            text-shadow: 0 2px 5px rgba(0,0,0,0.9), 0 0 15px rgba(255, 255, 255, 0.4);
            background: transparent;
            border: none;
            z-index: 2;
            letter-spacing: 2px;
        }

        .second-hand {
            position: absolute; bottom: 50%; left: 50%; width: 2px; height: 42%;
            background: var(--gold-matte); transform-origin: bottom center;
            animation: spin 60s linear infinite;
        }

        /* === נתונים (שמאל) === */
        .stats-content { 
            flex: 1; display: flex; flex-direction: column; 
            align-items: center; text-align: center; height: 100%;
            width: 100%;
        }
        
        .stat-group { 
            flex: 1; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; width: 100%;
        }
        
        .stat-divider { width: 50%; height: 2px; background: rgba(212,175,55,0.2); flex-shrink: 0; }
        .stat-label { font-size: 2.2vh; color: var(--text-dim); text-transform: uppercase; margin-bottom: 1vh; letter-spacing: 1px; }
        .stat-value { font-size: 8vh; font-weight: 900; color: #fff; line-height: 1; text-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        .currency { color: var(--gold-matte); font-size: 4.5vh; vertical-align: super; margin-left: 5px; }
        .ticket-highlight { color: var(--gold-bright); text-shadow: 0 0 30px rgba(241, 196, 15, 0.5); }

        /* === תרומות (ימין) === התיקון לאפל יושב כאן: flex-start במקום center */
        .feed-container { 
            flex: 1; display: flex; flex-direction: column; 
            gap: 1.2vh; overflow: hidden; justify-content: flex-start; padding-top: 1vh;
        }
        .feed-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.03); padding: 1.5vh 2vh; border-radius: 10px;
            font-size: 2vh; border-right: 4px solid #004d2e;
        }
        .feed-item.fresh { border-right-color: var(--gold-matte); background: rgba(212, 175, 55, 0.15); animation: slideIn 0.5s ease-out; color: #fff; }

        /* === מטריצה - 33% תחתון מחשב === */
        .bottom-area {
            flex: 1; 
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            padding: 1.5vh 3vh; 
            display: flex; flex-direction: column; box-sizing: border-box;
            min-height: 33vh;
        }

        .grid-container {
            flex: 1; display: flex; flex-wrap: wrap;
            justify-content: center; align-content: center; 
            gap: 0.4vh; overflow-y: hidden;
        }

        .ticket {
            background: rgba(255, 255, 255, 0.04); 
            color: var(--ticket-free) !important;
            width: 2.1vh; height: 2.1vh;
            display: flex; justify-content: center; align-items: center;
            font-size: 1vh !important; font-weight: 700; border-radius: 3px;
        }

        .ticket.taken {
            background: linear-gradient(135deg, #f1c40f 0%, #b8860b 100%);
            color: #000 !important; 
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
            border: none; transform: scale(1.1); z-index: 1;
        }

        /* === פופ-אפ בתחתית צד שמאל === */
        #notification-popup {
            position: fixed; bottom: 4vh; left: -400px; width: 320px;
            background: linear-gradient(135deg, #002211 0%, #000 100%);
            color: #fff; padding: 25px; border-radius: 15px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.9); z-index: 2000;
            transition: left 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid var(--gold-matte); text-align: center;
        }
        #notification-popup.show { left: 4vh; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 0px; }

        /* =========================================
           התאמה למובייל (מסכים צרים כמו פלאפונים)
           ========================================= */
        @media (max-width: 768px) {
            body { overflow-y: auto; } 
            
            .main-stage {
                height: auto;
                flex-direction: column; 
                padding: 20px 10px;
                gap: 20px;
            }

            .center-col { order: 1; padding: 20px 0; } 
            .panel:nth-of-type(2) { order: 2; height: 350px; } 
            .panel:nth-of-type(1) { order: 3; height: 400px; } 

            .main-title { font-size: 35px; }
            .sub-title { font-size: 16px; margin-bottom: 30px; }
            
            .rolex-container { width: 280px; height: 280px; margin: 0 auto; }
            .timer-digital { font-size: 30px; }
            /* כתר למובייל */
            .rolex-face div:first-child { font-size: 50px !important; } 
            
            .donate-btn { font-size: 20px; padding: 15px 30px; margin-top: 30px; width: 80%; max-width: 300px; }

            .stat-value { font-size: 60px; }
            .stat-label { font-size: 16px; }
            .currency { font-size: 35px; }
            
            .feed-item { font-size: 16px; padding: 12px; }

            .bottom-area {
                order: 4;
                height: auto;
                min-height: auto;
                padding: 15px 5px;
            }
            .grid-container {
                gap: 3px;
                padding-bottom: 20px;
