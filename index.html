<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת הגרלת התרי"ג - ישיבת שערי דעת</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300;500;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

        * {
            box-sizing: border-box;
        }

        /* === צבעי רולקס מוארים וחיים יותר === */
        :root {
            --bg-deep: #002b18; 
            --panel-bg: rgba(0, 45, 25, 0.7); 
            --gold-matte: #d4af37; 
            --gold-bright: #f1c40f;
            --text-soft: #ffffff; 
            --text-dim: #a6c4b2; 
            --ticket-free: #84a896; 
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-soft);
            font-family: 'Rubik', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        body::before {
            content: "";
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #00502b 0%, #001a0f 100%); 
            z-index: -1;
        }

        /* === הלוגו המרחף בצד === */
        .side-logo {
            position: fixed;
            top: 3.5vh;
            left: 3.5vh;
            height: 16vh; 
            z-index: 1000;
            pointer-events: none; 
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.6)); 
        }

        /* === פריסה בסיסית (מחשב) === */
        .main-stage {
            height: 73vh; 
            width: 100%;
            display: flex;
            padding: 2.5vh; 
            gap: 2.5vh;
            align-items: stretch;
        }

        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 0 0 20px rgba(0, 255, 100, 0.02);
            display: flex;
            flex-direction: column;
            padding: 2vh 2.5vh;
            flex: 1;
            height: 100%;
        }

        .center-col {
            flex: 1.3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* === אלמנטים מרכזיים === */
        .main-title { font-size: 5.5vh; font-weight: 900; letter-spacing: 2px; text-align: center; text-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .sub-title { font-size: 2.2vh; color: var(--gold-matte); letter-spacing: 4px; font-weight: 700; text-align: center; margin-bottom: 2vh; }

        /* === כפתור תרומה === */
        .donate-btn {
            margin-top: 3vh;
            background: linear-gradient(135deg, #FFD700 0%, #d4af37 100%);
            color: #000;
            font-size: 2.5vh;
            font-weight: 900;
            padding: 1.5vh 4vh;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
            border: 2px solid #fff;
            transition: all 0.3s ease;
            text-align: center;
            display: inline-block;
        }
        
        .donate-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.6);
            background: linear-gradient(135deg, #f1c40f 0%, #e6b800 100%);
        }

        /* === עיצוב השעון === */
        .rolex-container {
            position: relative;
            width: 36vh; height: 36vh; 
            background: #000;
            border-radius: 50%;
            border: 5px dashed var(--gold-matte); 
            box-shadow: 0 0 0 5px #4a3b1a, inset 0 0 40px #000, 0 10px 40px rgba(0, 0, 0, 0.8);
            display: flex; justify-content: center; align-items: center;
        }

        .rolex-face {
            position: absolute; width: 92%; height: 92%;
            background: radial-gradient(circle, #002211 0%, #000000 100%); 
            border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .rolex-face::before {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 95%; height: 95%; 
            border-radius: 50%;
            border: 2px solid rgba(212, 175, 55, 0.35); 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
            z-index: 0;
            pointer-events: none;
        }
        
        .timer-digital {
            font-family: 'Orbitron', sans-serif;
            color: #fff; 
            font-size: 4vh; 
            text-shadow: 0 2px 5px rgba(0,0,0,0.9), 0 0 15px rgba(255, 255, 255, 0.4);
            background: transparent;
            border: none;
            z-index: 2;
            letter-spacing: 2px;
        }

        .second-hand {
            position: absolute; bottom: 50%; left: 50%; width: 2px; height: 42%;
            background: var(--gold-matte); transform-origin: bottom center;
            animation: spin 60s linear infinite;
        }

        /* === נתונים (שמאל) === */
        .stats-content { 
            flex: 1; display: flex; flex-direction: column; 
            align-items: center; text-align: center; height: 100%;
            width: 100%;
        }
        
        .stat-group { 
            flex: 1; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; width: 100%;
        }
        
        .stat-divider { width: 50%; height: 2px; background: rgba(212,175,55,0.2); flex-shrink: 0; }
        .stat-label { font-size: 2.2vh; color: var(--text-dim); text-transform: uppercase; margin-bottom: 1vh; letter-spacing: 1px; }
        .stat-value { font-size: 8vh; font-weight: 900; color: #fff; line-height: 1; text-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        .currency { color: var(--gold-matte); font-size: 4.5vh; vertical-align: super; margin-left: 5px; }
        .ticket-highlight { color: var(--gold-bright); text-shadow: 0 0 30px rgba(241, 196, 15, 0.5); }

        /* === תרומות (ימין) === */
        .feed-container { 
            flex: 1; display: flex; flex-direction: column; 
            gap: 1.2vh; overflow: hidden; justify-content: flex-start; padding-top: 1vh;
        }
        .feed-item {
            display: grid; 
            grid-template-columns: 1fr auto; 
            align-items: center;
            background: rgba(255, 255, 255, 0.05); 
            padding: 1.5vh 2vh; 
            border-radius: 10px;
            font-size: 2vh; 
            border-right: 4px solid #004d2e;
            width: 100%; 
            color: #ffffff;
        }
        .feed-item.fresh { border-right-color: var(--gold-matte); background: rgba(212, 175, 55, 0.15); animation: slideIn 0.5s ease-out; }
        
        .donor-name {
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-left: 10px;
            font-weight: 500;
        }
        .donor-amount {
            font-weight: 900;
            color: var(--gold-bright);
            direction: ltr; 
        }

        /* === מטריצה - תחתון מחשב === */
        .bottom-area {
            height: 27vh; 
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            padding: 1.5vh 3vh; 
            display: flex; flex-direction: column; 
        }

        .grid-container {
            flex: 1; display: flex; flex-wrap: wrap;
            justify-content: center; align-content: center; 
            gap: 0.3vh;
            overflow-y: hidden;
            direction: ltr;
        }

        .ticket {
            background: rgba(255, 255, 255, 0.04); 
            color: var(--ticket-free) !important;
            width: 1.9vh; height: 1.9vh; 
            display: flex; justify-content: center; align-items: center;
            font-size: 1vh !important; font-weight: 700; border-radius: 3px;
        }

        .ticket.taken {
            background: linear-gradient(135deg, #f1c40f 0%, #b8860b 100%);
            color: #000 !important; 
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
            border: none; transform: scale(1.1); z-index: 1;
        }

        /* === פופ-אפ בתחתית צד שמאל === */
        #notification-popup {
            position: fixed; bottom: 4vh; left: -400px; width: 320px;
            background: linear-gradient(135deg, #002211 0%, #000 100%);
            color: #fff; padding: 25px; border-radius: 15px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.9); z-index: 2000;
            transition: left 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid var(--gold-matte); text-align: center;
        }
        #notification-popup.show { left: 4vh; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 0px; }

        /* =========================================
           התאמה למובייל (מסכים צרים כמו פלאפונים)
           ========================================= */
        @media (max-width: 768px) {
            body { overflow-y: auto; overflow-x: hidden; height: auto; } 
            
            .side-logo { height: 10vh; top: 1.5vh; left: 2vh; } 

            .main-stage {
                height: auto;
                flex-direction: column; 
                padding: 20px 10px;
                gap: 20px;
            }

            .center-col { order: 1; padding: 20px 0; } 
            .panel:nth-of-type(2) { order: 2; height: 350px; } 
            .panel:nth-of-type(1) { order: 3; height: 400px; } 

            .main-title { font-size: 35px; }
            .sub-title { font-size: 16px; margin-bottom: 30px; }
            
            .rolex-container { width: 280px; height: 280px; margin: 0 auto; }
            .timer-digital { font-size: 30px; }
            .rolex-face div:first-child { font-size: 50px !important; top: 18% !important; } 
            
            .donate-btn { font-size: 20px; padding: 15px 30px; margin-top: 30px; width: 80%; max-width: 300px; }

            .stat-value { font-size: 60px; }
            .stat-label { font-size: 16px; }
            .currency { font-size: 35px; }
            
            .feed-item { font-size: 16px; padding: 12px; }

            .bottom-area {
                order: 4;
                height: auto;
                min-height: auto;
                padding: 15px 5px;
            }
            .grid-container {
                gap: 3px;
                padding-bottom: 20px;
            }
            .ticket {
                width: 14px; 
                height: 14px;
                font-size: 8px !important;
            }

            #notification-popup {
                width: 90%; left: 5%; bottom: -200px; 
                top: auto; transition: bottom 0.5s;
            }
            #notification-popup.show { bottom: 20px; left: 5%; }
        }
    </style>
</head>
<body>

    <img src="logo.png" alt="לוגו התריג" class="side-logo">

    <div class="main-stage">
        <div class="panel">
            <div class="feed-container" id="feed"></div>
        </div>

        <div class="center-col">
            <div class="main-title">הגרלת התרי"ג</div>
            <div class="sub-title">ישיבת שערי דעת</div>
            
            <div class="rolex-container">
                <div class="rolex-face">
                    <div style="position: absolute; top: 18%; font-size: 6.5vh; color: var(--gold-matte); z-index: 2; line-height: 1;">♛</div>
                    <div class="timer-digital" id="timer">00:00:00</div>
                    <div class="second-hand"></div>
                    <div style="position: absolute; width: 10px; height: 10px; background: var(--gold-matte); border-radius: 50%; z-index: 3; box-shadow: 0 0 5px #000;"></div>
                </div>
            </div>

            <a href="https://www.rayze.it/shaaredaaspurimraffle/" target="_blank" class="donate-btn">
                לרכישת כרטיס
            </a>
        </div>

        <div class="panel">
            <div class="stats-content">
                <div class="stat-group">
                    <div class="stat-label">סכום שגויס</div>
                    <div class="stat-value"><span class="currency">$</span><span id="total-money">0</span></div>
                </div>
                
                <div class="stat-divider"></div>

                <div class="stat-group">
                    <div class="stat-label">כרטיסים שנמכרו</div>
                    <div class="stat-value ticket-highlight" id="tickets-sold">0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-area">
        <div class="grid-container" id="grid"></div>
    </div>

    <div id="notification-popup">
        <div style="color: var(--gold-matte); font-weight: bold; margin-bottom: 10px;">🎉 תרומה חדשה!</div>
        <div id="pop-name" style="font-size: 2rem; font-weight: 900; margin-bottom: 10px;"></div>
        <div id="pop-amount" style="font-size: 2.8rem; font-weight: 900; color: var(--gold-matte);"></div>
    </div>

    <script>
        const SHEET_ID = "1MGEhAjDztD_uVpDn7CI6lgc0X2ZNVEU8mGELmBXktvA"; 
        const SHEET_NAME = "tormim";
        
        // טיימר מכוון ל-12 בלילה שבין יום רביעי ליום חמישי (תחילת ר"ח ניסן)
        const TARGET_DATE = new Date("March 19, 2026 00:00:00").getTime();

        const totalTickets = 613;
        const gridEl = document.getElementById('grid');
        for (let i = 1; i <= totalTickets; i++) {
            let d = document.createElement('div');
            d.className = 'ticket';
            d.id = 't-' + i;
            d.innerText = i;
            gridEl.appendChild(d);
        }

        let previousTotalCount = -1;

        setInterval(() => {
            const now = new Date().getTime();
            const distance = TARGET_DATE - now;
            if (distance < 0) { document.getElementById("timer").innerHTML = "00:00:00"; return; }
            const h = Math.floor(distance / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);
            document.getElementById("timer").innerHTML = (h<10?"0"+h:h)+":"+(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
        }, 1000);

        function fetchGoogleData() {
            let script = document.createElement('script');
            script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:loadData&sheet=${SHEET_NAME}&_=${new Date().getTime()}`;
            document.body.appendChild(script);
            setTimeout(() => script.remove(), 2000);
        }

        window.loadData = function(json) {
            let totalMoney = 0;
            let currentDonors = [];
            let currentSold = [];
            let tempSoldTracker = new Set();

            if (json && json.table && json.table.rows) {
                json.table.rows.forEach(row => {
                    if(!row.c || !row.c[1]) return;
                    let name = row.c[0] ? (row.c[0].v || "אנונימי") : "אנונימי";
                    if(name === "name" || name === "Name") return;
                    
                    let amount = Math.round(parseFloat(String(row.c[1].v).replace(/[^0-9.-]+/g,"")));
                    
                    if (amount > 0 && amount <= 613 && !tempSoldTracker.has(amount)) {
                        totalMoney += amount;
                        currentDonors.push({name, amount});
                        currentSold.push(amount);
                        tempSoldTracker.add(amount); 
                    }
                });
            }

            document.getElementById('total-money').innerText = totalMoney.toLocaleString();
            document.getElementById('tickets-sold').innerText = currentSold.length;
            
            currentSold.forEach(num => {
                let el = document.getElementById('t-' + num);
                if(el && !el.classList.contains('taken')) el.classList.add('taken');
            });

            if (previousTotalCount !== -1 && currentDonors.length > previousTotalCount) {
                let newItems = currentDonors.slice(-(currentDonors.length - previousTotalCount));
                newItems.forEach(item => addDonorToFeed(item.name, item.amount));
                triggerPopup(newItems[newItems.length - 1].name, newItems[newItems.length - 1].amount);
            } else if (previousTotalCount === -1) {
                currentDonors.slice(-9).forEach(item => addDonorToFeed(item.name, item.amount, false));
            }
            previousTotalCount = currentDonors.length;
        };

        function addDonorToFeed(name, amount, animate = true) {
            const feed = document.getElementById('feed');
            let div = document.createElement('div');
            div.className = 'feed-item' + (animate ? ' fresh' : '');
            
            div.innerHTML = `
                <span class="donor-name">${name}</span>
                <span class="donor-amount">$${amount.toLocaleString()}</span>
            `;
            
            feed.prepend(div);
            if (feed.children.length > 9) feed.lastElementChild.remove();
        }

        function triggerPopup(name, amount) {
            const popup = document.getElementById('notification-popup');
            document.getElementById('pop-name').innerText = name;
            document.getElementById('pop-amount').innerText = "$" + amount.toLocaleString();
            popup.classList.add('show');
            setTimeout(() => { popup.classList.remove('show'); }, 5000);
        }

        fetchGoogleData();
        setInterval(fetchGoogleData, 3000);
    </script>
</body>
</html>
