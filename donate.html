<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>רכישת כרטיס - הגרלת התרי"ג</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            background-color: #001a0f; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
        }
        .top-bar { 
            background: linear-gradient(135deg, #001a0f 0%, #000 100%); 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #d4af37;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            height: 60px;
            box-sizing: border-box;
        }
        .back-btn { 
            color: #000; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1rem;
            background: linear-gradient(135deg, #FFD700 0%, #d4af37 100%);
            padding: 8px 20px;
            border-radius: 50px;
            box-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            transform: scale(1.05);
        }
        .title { 
            color: #d4af37; 
            font-size: 1.2rem; 
            font-weight: bold; 
            text-shadow: 0 2px 5px #000;
        }
        iframe { 
            width: 100%; 
            height: calc(100vh - 60px); /* תופס את כל שאר המסך מתחת לפס העליון */
            border: none; 
            background: #fff; /* רקע לבן למקרה שהאתר שלהם טוען לאט */
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="back-btn">🡢 חזרה למסך הלייב</a>
        <div class="title">הגרלת התרי"ג</div>
    </div>
    
    <iframe src="https://www.rayze.it/shaaredaaspurimraffle/"></iframe>

</body>
</html>
